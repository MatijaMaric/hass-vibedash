<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF9F43;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD93D;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4ECDC4;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#4ECDC4;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background glow -->
  <circle cx="120" cy="120" r="115" fill="url(#glow)"/>

  <!-- Main dashboard frame -->
  <rect x="40" y="40" width="160" height="160" rx="12" fill="none" stroke="url(#grad1)" stroke-width="3"/>

  <!-- Grid dividers for dashboard -->
  <line x1="110" y1="40" x2="110" y2="200" stroke="url(#grad1)" stroke-width="2" opacity="0.6"/>
  <line x1="40" y1="110" x2="200" y2="110" stroke="url(#grad1)" stroke-width="2" opacity="0.6"/>

  <!-- Top-left quadrant: Chart/Sparkline -->
  <g clip-path="url(#clip1)">
    <path d="M 50 100 L 70 85 L 85 95 L 100 70 L 105 80" stroke="#FF6B6B" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="50" cy="100" r="3" fill="#FF6B6B"/>
    <circle cx="70" cy="85" r="3" fill="#FF9F43"/>
    <circle cx="85" cy="95" r="3" fill="#FFD93D"/>
  </g>

  <!-- Top-right quadrant: Metric display -->
  <text x="155" y="75" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FF9F43" text-anchor="middle">72%</text>
  <rect x="135" y="85" width="40" height="2" fill="#FFD93D" rx="1"/>

  <!-- Bottom-left quadrant: Gauge indicator -->
  <circle cx="75" cy="155" r="18" fill="none" stroke="#4ECDC4" stroke-width="2.5" opacity="0.7"/>
  <path d="M 75 140 A 15 15 0 0 1 88 155" fill="none" stroke="#4ECDC4" stroke-width="3" stroke-linecap="round"/>

  <!-- Bottom-right quadrant: AI sparkles -->
  <circle cx="160" cy="140" r="4" fill="#FFD93D"/>
  <circle cx="155" cy="155" r="3" fill="#FF9F43" opacity="0.8"/>
  <circle cx="170" cy="160" r="2.5" fill="#FF6B6B" opacity="0.7"/>

  <!-- Decorative sparkle lines (representing AI/intelligence) -->
  <line x1="160" y1="130" x2="160" y2="120" stroke="#FFD93D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="170" y1="140" x2="179" y2="140" stroke="#FFD93D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="150" y1="140" x2="141" y2="140" stroke="#FF9F43" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
  <line x1="160" y1="150" x2="160" y2="160" stroke="#FF9F43" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>

  <!-- Subtle wave/vibe element at bottom -->
  <path d="M 50 210 Q 65 205 80 210 T 110 210 T 140 210 T 170 210 T 200 210" fill="none" stroke="url(#grad1)" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
</svg>
