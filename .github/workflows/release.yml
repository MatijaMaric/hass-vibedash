name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Verify manifest version matches tag
        run: |
          MANIFEST_VERSION=$(python3 -c "import json; print(json.load(open('custom_components/vibedash/manifest.json'))['version'])")
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: manifest.json version ($MANIFEST_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version $MANIFEST_VERSION verified."

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Package integration
        run: |
          cd custom_components/vibedash
          zip -r ../../vibedash.zip . \
            --exclude "./__pycache__/*" \
            --exclude "./**/__pycache__/*" \
            --exclude "./*.pyc" \
            --exclude "./**/*.pyc"

      - name: Verify zip contents
        run: |
          echo "=== Zip contents ==="
          unzip -l vibedash.zip
          echo ""
          echo "=== Checking required files ==="
          REQUIRED_FILES=(
            "__init__.py"
            "manifest.json"
            "config_flow.py"
            "websocket_api.py"
            "frontend/vibedash-panel.js"
          )
          MISSING=0
          for f in "${REQUIRED_FILES[@]}"; do
            if unzip -l vibedash.zip | grep -q "$f"; then
              echo "  OK  $f"
            else
              echo "  MISSING  $f"
              MISSING=1
            fi
          done
          if [ "$MISSING" -ne 0 ]; then
            echo ""
            echo "ERROR: One or more required files are missing from vibedash.zip"
            exit 1
          fi
          echo ""
          echo "All required files present."

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "VibeDash ${{ github.ref_name }}"
          generate_release_notes: true
          body: ""
          make_latest: true
          files: vibedash.zip
